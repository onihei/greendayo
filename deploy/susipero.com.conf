# Next.js 版 すしぺろ nginx 設定
#
# 配置先: /etc/nginx/sites-available/susipero.com
# 有効化: sudo ln -sf /etc/nginx/sites-available/susipero.com /etc/nginx/sites-enabled/susipero.com
# 反映:   sudo nginx -t && sudo systemctl reload nginx
#
# 前提:
#   - Next.js が 127.0.0.1:3000 で起動 (pm2 名: susipero)
#   - アップロードファイルは /var/lib/susipero/uploads/ に配置
#   - 既存 SSL 設定 (Let's Encrypt 等) はサーバ側に既存のものを利用

server {
    listen 80;
    listen [::]:80;
    server_name susipero.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name susipero.com;

    # === SSL ===
    # 既存の Let's Encrypt 証明書をそのまま流用
    ssl_certificate     /etc/letsencrypt/live/susipero.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/susipero.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # === ボディサイズ ===
    # /api/upload が 10MB 上限のため、上限+α
    client_max_body_size 12M;

    # === アップロード済みファイルを直接配信 (Node を経由しない) ===
    location /storage/ {
        alias /var/lib/susipero/uploads/;
        expires max;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # === Let's Encrypt 認証 ===
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/.well-known-root;
    }

    # === それ以外は全部 Next.js へ ===
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
